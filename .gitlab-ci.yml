# CI MLOps-платформы (GitLab Runner в k3s, kubernetes executor).
# Пока: lint/валидация. Дальше: build train-образа (kaniko) + registry + деплой через Argo.
stages:
  - lint
  - build

lint:dags:
  stage: lint
  image: python:3.12-slim
  script:
    - python -m py_compile dags/*.py
    - echo "DAG syntax OK"

lint:yaml:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install -q pyyaml
  script:
    - |
      python - <<'PY'
      import glob, sys, yaml
      bad = 0
      for f in glob.glob("gitops/**/*.yaml", recursive=True) + glob.glob("serving/*.yaml") + ["airflow-values.yaml", "minio-values.yaml", "jupyterhub-values.yaml", "vault-values.yaml"]:
          try:
              list(yaml.safe_load_all(open(f)))
              print("OK ", f)
          except Exception as e:
              print("FAIL", f, "->", e); bad += 1
      sys.exit(1 if bad else 0)
      PY

# Сборка train-образа: kaniko (докер-демон не нужен), push в registry кластера.
# push -> svc-адрес (kaniko в поде, hosts-домены не резолвятся); pull нодой -> registry.mlops.local (registries.yaml).
build:train:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/dockerfiles/train/Dockerfile"
      --destination "registry.gitlab.svc.cluster.local:5000/mlops/train:${CI_COMMIT_SHORT_SHA}"
      --destination "registry.gitlab.svc.cluster.local:5000/mlops/train:latest"
      --insecure
  rules:
    - changes:
        - dockerfiles/**/*
        - .gitlab-ci.yml
