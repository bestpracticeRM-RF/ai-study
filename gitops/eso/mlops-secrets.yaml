# Секреты приложений из Vault (ClusterSecretStore "vault"). Паролей в файле нет.
# minio root
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root
  namespace: mlops-infra
spec:
  refreshInterval: 1h
  secretStoreRef: { kind: ClusterSecretStore, name: vault }
  target:
    name: minio-root
    creationPolicy: Owner
    template:
      data:
        rootUser: "{{ .access_key }}"
        rootPassword: "{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef: { key: mlops/minio, property: access_key }
    - secretKey: secret_key
      remoteRef: { key: mlops/minio, property: secret_key }
---
# mlflow: S3 creds
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlflow-s3-creds
  namespace: mlops-tracking
spec:
  refreshInterval: 1h
  secretStoreRef: { kind: ClusterSecretStore, name: vault }
  target: { name: mlflow-s3-creds, creationPolicy: Owner }
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: mlops/minio, property: access_key }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: mlops/minio, property: secret_key }
---
