# Argo CD Application: мониторинг-манифесты (скрейпы + дашборды-как-код).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-extras
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bestpracticeRM-RF/ai-study.git
    targetRevision: main
    path: gitops/monitoring
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
