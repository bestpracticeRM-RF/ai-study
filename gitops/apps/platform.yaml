# Argo CD Application: платформенные мелочи (ingress-ы и т.п.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bestpracticeRM-RF/ai-study.git
    targetRevision: main
    path: gitops/platform
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
