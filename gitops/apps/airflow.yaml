# Argo CD Application: Airflow (helm chart + values из git, секретов в values нет).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: 1.21.0
      helm:
        releaseName: airflow
        valueFiles:
          - $values/airflow-values.yaml
    - repoURL: https://github.com/bestpracticeRM-RF/ai-study.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-pipelines
  syncPolicy:
    automated:
      prune: false     # stateful (postgres, PVC) — без авто-удалений
      selfHeal: false  # airflow-чарт содержит hooks/миграции: сначала наблюдаем diff, selfHeal позже
    syncOptions:
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # чарт генерит секреты/ключи при установке — не считать дрейфом
    - group: ""
      kind: Secret
      jsonPointers: ["/data"]
