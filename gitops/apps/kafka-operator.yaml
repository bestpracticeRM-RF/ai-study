# Argo CD Application: Strimzi Kafka operator (Helm).
# Strimzi 1.x — KRaft-ONLY (Zookeeper убран с 1.0). Один источник правды для оператора.
# Bootstrap: kubectl apply -f gitops/apps/kafka-operator.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: 1.1.0
    helm:
      releaseName: strimzi
      values: |
        watchAnyNamespace: true
        featureGates: ""
        resources:
          requests: { memory: 256Mi, cpu: 100m }
          limits:   { memory: 512Mi, cpu: 500m }
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
