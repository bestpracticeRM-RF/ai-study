# Docker Registry для CI-образов (kaniko push из CI, pull нодой k3s).
# HTTP без TLS (лаба): для pull нодой нужен /etc/rancher/k3s/registries.yaml (см. доку PHASE3-REGISTRY).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: gitlab
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 20Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: gitlab
  labels: { app: registry }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - { name: http, containerPort: 5000 }
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            requests: { memory: 64Mi, cpu: 20m }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
          readinessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: registry-data }
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: gitlab
spec:
  selector: { app: registry }
  ports:
    - { name: http, port: 5000, targetPort: 5000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry
  namespace: gitlab
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"   # слои образов большие
spec:
  ingressClassName: nginx
  rules:
    - host: registry.mlops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry
                port: { number: 5000 }
