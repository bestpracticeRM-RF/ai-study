# GitLab CE omnibus одним подом — обучающая станция (не prod-топология).
# Prod = cloud-native chart / отдельные VM. Здесь осознанный компромисс по RAM (~4GB).
# Root-пароль: env GITLAB_ROOT_PASSWORD из ESO-секрета gitlab-root (Vault: secret/mlops/gitlab).
# Первый старт долгий: omnibus reconfigure ~4-6 мин.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-config
  namespace: gitlab
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-data
  namespace: gitlab
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources: { requests: { storage: 30Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
  labels: { app: gitlab }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC — два пода не поднять
  selector:
    matchLabels: { app: gitlab }
  template:
    metadata:
      labels: { app: gitlab }
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:18.3.2-ce.0
          env:
            - name: GITLAB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: gitlab-root, key: password }
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://gitlab.mlops.local'
                # экономия RAM: выключаем лишнее для лабы
                prometheus_monitoring['enable'] = false
                registry['enable'] = false
                gitlab_kas['enable'] = false
                sidekiq['max_concurrency'] = 5
                puma['worker_processes'] = 2
                postgresql['shared_buffers'] = "256MB"
          ports:
            - { name: http, containerPort: 80 }
          resources:
            requests: { memory: 3Gi, cpu: 500m }
            limits:   { memory: 5Gi, cpu: "4" }
          readinessProbe:
            httpGet: { path: /-/readiness, port: 80 }
            initialDelaySeconds: 180
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            httpGet: { path: /-/liveness, port: 80 }
            initialDelaySeconds: 600
            periodSeconds: 30
          volumeMounts:
            - { name: config, mountPath: /etc/gitlab }
            - { name: data,   mountPath: /var/opt/gitlab }
            - { name: logs,   mountPath: /var/log/gitlab }
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: gitlab-config }
        - name: data
          persistentVolumeClaim: { claimName: gitlab-data }
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: gitlab
spec:
  selector: { app: gitlab }
  ports:
    - { name: http, port: 80, targetPort: 80 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  namespace: gitlab
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"   # git push больших объектов
spec:
  ingressClassName: nginx
  rules:
    - host: gitlab.mlops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab
                port: { number: 80 }
