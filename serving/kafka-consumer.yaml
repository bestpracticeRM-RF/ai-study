apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-kafka-consumer
  namespace: mlops-serving
  labels: { app: iris-kafka-consumer }
spec:
  replicas: 1
  strategy: { type: RollingUpdate }
  selector:
    matchLabels: { app: iris-kafka-consumer }
  template:
    metadata:
      labels: { app: iris-kafka-consumer }
    spec:
      containers:
        - name: consumer
          # Собирается kaniko (CI) -> registry.mlops.local. :latest допустим с pullPolicy Always.
          image: registry.mlops.local/mlops/kafka-consumer:latest
          imagePullPolicy: Always
          env:
            - { name: KAFKA_BOOTSTRAP, value: "kafka-cluster-kafka-bootstrap.kafka:9092" }
            - { name: REQUEST_TOPIC,   value: "iris-requests" }
            - { name: RESPONSE_TOPIC,  value: "iris-responses" }
            - { name: GROUP_ID,        value: "iris-consumer" }
            - { name: TRITON_URL,      value: "http://triton.mlops-serving:8000" }
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 256Mi, cpu: 250m }
