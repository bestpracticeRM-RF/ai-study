# GitLab Runner (kubernetes executor) — обучающая станция.
# Токен НЕ здесь: k8s Secret gitlab-runner-secret (создан из Vault secret/mlops/gitlab).
# URL внутрикластерный: gitlab.mlops.local в подах не резолвится (hosts-домен),
# поэтому и url, и clone_url — на svc.
gitlabUrl: http://gitlab.gitlab.svc.cluster.local
runners:
  secret: gitlab-runner-secret
  config: |
    [[runners]]
      url = "http://gitlab.gitlab.svc.cluster.local"
      clone_url = "http://gitlab.gitlab.svc.cluster.local"
      executor = "kubernetes"
      [runners.kubernetes]
        namespace = "gitlab"
        image = "alpine:3.20"
        cpu_request = "100m"
        memory_request = "128Mi"
        memory_limit = "2Gi"
rbac:
  create: true
resources:
  requests: { memory: 128Mi, cpu: 50m }
  limits: { memory: 256Mi }
