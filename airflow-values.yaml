# Airflow — обучающая станция. Паролей в файле НЕТ (можно в git).
# MinIO-креды в task-поды приходят из k8s Secret airflow-minio-creds (создаёт ESO из Vault).
executor: "KubernetesExecutor"

redis:
  enabled: false
flower:
  enabled: false

ingress:
  web:
    enabled: true
    ingressClassName: "nginx"
    hosts:
      - name: "airflow.mlops.local"
        tls:
          enabled: false

# Несекретные env
env:
  - name: "MLFLOW_S3_ENDPOINT_URL"
    value: "http://minio.mlops-infra.svc.cluster.local:9000"
  - name: "MLFLOW_TRACKING_URI"
    value: "http://mlflow.mlops-tracking.svc.cluster.local"

# Секретные env — из ESO-секрета (Vault: secret/mlops/minio)
secret:
  - envName: "AWS_ACCESS_KEY_ID"
    secretName: "airflow-minio-creds"
    secretKey: "AWS_ACCESS_KEY_ID"
  - envName: "AWS_SECRET_ACCESS_KEY"
    secretName: "airflow-minio-creds"
    secretKey: "AWS_SECRET_ACCESS_KEY"

# DAG-и из Git (было включено через --set, теперь зафиксировано в файле)
dags:
  gitSync:
    enabled: true
    repo: https://github.com/bestpracticeRM-RF/ai-study.git
    branch: main
    subPath: dags
    period: 30s

# Встроенный Postgres чарта (пароль генерит чарт сам, в values его нет)
postgresql:
  enabled: true
